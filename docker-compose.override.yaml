version: '3.9'

# =============================================================================
# Local Development Overrides
# =============================================================================
# This file is automatically loaded by docker compose and provides
# developer-friendly defaults for local development.
#
# To disable: docker compose -f docker-compose.yaml up
# =============================================================================

services:
  api:
    environment:
      # Enable verbose logging
      LOG_LEVEL: trace
      DEBUG: "idp:*,express:*"
      # Enable source maps
      NODE_OPTIONS: "--enable-source-maps --inspect=0.0.0.0:9229"
      # Disable rate limiting in dev
      RATE_LIMIT_ENABLED: "false"
      # Local AWS (LocalStack)
      AWS_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
    # Mount entire source for maximum flexibility
    volumes:
      - ./apps/api:/app/apps/api:delegated
      - ./packages:/app/packages:delegated
      - /app/node_modules
      - /app/apps/api/node_modules

  portal:
    environment:
      # Vite HMR configuration for Docker
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 5173
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/portal:/app/apps/portal:delegated
      - ./packages:/app/packages:delegated
      - /app/node_modules
      - /app/apps/portal/node_modules

  postgres:
    # Expose additional ports for database tools
    ports:
      - "5432:5432"
    environment:
      # Enable query logging
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
        -c log_statement=all
        -c log_duration=on
        -c log_min_duration_statement=100
        -c shared_preload_libraries=pg_stat_statements

  redis:
    # Enable keyspace notifications for debugging
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --notify-keyspace-events KEA
        --loglevel verbose

  # Add pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@idp.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - idp-network
    profiles:
      - tools

  # Add Redis Commander for cache inspection
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - idp-network
    profiles:
      - tools

volumes:
  pgadmin_data:
    driver: local
