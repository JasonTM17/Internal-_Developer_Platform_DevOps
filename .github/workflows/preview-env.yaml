name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PREVIEW_NAMESPACE: idp-preview-pr-${{ github.event.pull_request.number }}
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy Preview Environment
    runs-on: ubuntu-latest
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: https://pr-${{ github.event.pull_request.number }}.preview.idp.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push preview image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/idp-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name idp-dev --region ${{ env.AWS_REGION }}

      - name: Create preview namespace
        run: |
          kubectl create namespace ${{ env.PREVIEW_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace ${{ env.PREVIEW_NAMESPACE }} type=preview --overwrite
          kubectl annotate namespace ${{ env.PREVIEW_NAMESPACE }} \
            pr-number="${{ github.event.pull_request.number }}" \
            created-at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" --overwrite

      - name: Deploy to preview
        run: |
          helm upgrade --install idp-api \
            ./infra/helm/idp-platform \
            --namespace ${{ env.PREVIEW_NAMESPACE }} \
            --set image.tag=pr-${{ github.event.pull_request.number }} \
            --set image.repository=${{ env.ECR_REGISTRY }}/idp-api \
            --set environment=preview \
            --set replicaCount=1 \
            --set ingress.hosts[0].host=pr-${{ github.event.pull_request.number }}.preview.idp.example.com \
            --values ./infra/helm/idp-platform/values-dev.yaml \
            --wait \
            --timeout 5m

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Environment Deployed\n\n**URL:** https://pr-${context.issue.number}.preview.idp.example.com\n**Namespace:** \`${process.env.PREVIEW_NAMESPACE}\`\n\nThis environment will be automatically cleaned up when the PR is closed.`
            });

  cleanup-preview:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name idp-dev --region ${{ env.AWS_REGION }}

      - name: Delete preview namespace
        run: kubectl delete namespace ${{ env.PREVIEW_NAMESPACE }} --ignore-not-found
