name: CD - Deploy to Staging

on:
  push:
    branches: ['release/**']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.2.3)'
        required: true
        type: string
      run_e2e:
        description: 'Run E2E tests after deployment'
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: idp-staging
  NAMESPACE: idp-staging
  ENVIRONMENT: staging

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(echo "${{ github.ref_name }}" | sed 's|release/||')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~10)..HEAD | head -20)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "${CHANGELOG}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        service: [api, portal]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/idp-${{ matrix.service }}:${{ needs.prepare.outputs.version }}
            ${{ env.ECR_REGISTRY }}/idp-${{ matrix.service }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            VERSION=${{ needs.prepare.outputs.version }}

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    environment:
      name: staging
      url: https://staging.idp.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Deploy with Helm
        run: |
          for service in api portal; do
            helm upgrade --install "idp-${service}" \
              ./infra/helm/idp-platform \
              --namespace ${{ env.NAMESPACE }} \
              --set image.tag=${{ needs.prepare.outputs.version }} \
              --set image.repository=${{ env.ECR_REGISTRY }}/idp-${service} \
              --set environment=${{ env.ENVIRONMENT }} \
              --set replicaCount=2 \
              --values ./infra/helm/idp-platform/values-staging.yaml \
              --wait \
              --timeout 10m
          done

      - name: Verify deployment health
        run: |
          kubectl wait --for=condition=available deployment --all \
            -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Run health checks
        run: |
          STAGING_URL="https://staging.idp.example.com"
          for endpoint in /health /ready /metrics; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}${endpoint}")
            if [[ "$HTTP_CODE" != "200" ]]; then
              echo "Health check failed for ${endpoint}: HTTP ${HTTP_CODE}"
              exit 1
            fi
          done

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event.inputs.run_e2e != 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run E2E tests
        run: npx playwright test --project=staging
        env:
          BASE_URL: https://staging.idp.example.com
          API_URL: https://staging-api.idp.example.com

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-staging
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 load tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/performance/staging-load.js
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          BASE_URL: https://staging-api.idp.example.com

      - name: Check performance thresholds
        run: |
          echo "Performance test completed - check k6 cloud for detailed results"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, e2e-tests, performance-test]
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging Deployment ${{ needs.deploy.result == 'success' && '✅' || '❌' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment*\n*Version:* `${{ needs.prepare.outputs.version }}`\n*Deploy:* ${{ needs.deploy.result }}\n*E2E Tests:* ${{ needs.e2e-tests.result }}\n*Perf Tests:* ${{ needs.performance-test.result }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Changelog:*\n${{ needs.prepare.outputs.changelog }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
