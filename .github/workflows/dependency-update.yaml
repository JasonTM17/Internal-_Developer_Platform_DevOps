name: Dependency Update

on:
  schedule:
    - cron: '0 8 * * 1' # Weekly Monday 8am UTC
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of update to perform'
        required: true
        type: choice
        options:
          - all
          - security-only
          - minor-patch

permissions:
  contents: write
  pull-requests: write

jobs:
  update-npm:
    name: Update NPM Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for updates
        id: updates
        run: |
          if [[ "${{ github.event.inputs.update_type }}" == "security-only" ]]; then
            npm audit fix --force 2>&1 | tee update-log.txt
          elif [[ "${{ github.event.inputs.update_type }}" == "minor-patch" ]]; then
            npx npm-check-updates -u --target minor 2>&1 | tee update-log.txt
            npm install
          else
            npx npm-check-updates -u --target latest 2>&1 | tee update-log.txt
            npm install
          fi
          
          if git diff --quiet package-lock.json; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        if: steps.updates.outputs.has_updates == 'true'
        run: npx turbo test --filter='...'

      - name: Create Pull Request
        if: steps.updates.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.BOT_PAT }}
          commit-message: 'chore(deps): update npm dependencies'
          title: 'chore(deps): automated dependency update'
          body: |
            ## Automated Dependency Update
            
            **Update type:** ${{ github.event.inputs.update_type || 'all' }}
            **Date:** ${{ github.event.repository.updated_at }}
            
            ### Changes
            ```
            $(cat update-log.txt)
            ```
            
            ### Checklist
            - [ ] Tests pass
            - [ ] No breaking changes
            - [ ] Security vulnerabilities addressed
          branch: deps/npm-update-${{ github.run_number }}
          labels: |
            dependencies
            automated

  update-terraform:
    name: Update Terraform Providers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Check provider updates
        id: tf-updates
        run: |
          find infra/terraform -name "*.tf" -exec grep -l "required_providers" {} \; | while read f; do
            DIR=$(dirname "$f")
            pushd "$DIR"
            terraform init -upgrade
            popd
          done
          
          if git diff --quiet; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.tf-updates.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.BOT_PAT }}
          commit-message: 'chore(deps): update terraform providers'
          title: 'chore(deps): update Terraform provider versions'
          body: |
            ## Terraform Provider Update
            
            Automated update of Terraform provider versions.
            
            ### Checklist
            - [ ] `terraform plan` shows no unexpected changes
            - [ ] Provider changelogs reviewed for breaking changes
          branch: deps/terraform-update-${{ github.run_number }}
          labels: |
            dependencies
            terraform
            automated

  update-docker:
    name: Update Docker Base Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Check for base image updates
        id: docker-updates
        run: |
          # Check Node.js base image
          CURRENT_NODE=$(grep -oP 'FROM node:\K[^ ]+' apps/api/Dockerfile | head -1)
          LATEST_NODE=$(curl -s "https://registry.hub.docker.com/v2/repositories/library/node/tags?page_size=10&name=20-alpine" | \
            jq -r '.results[0].name')
          
          if [[ "$CURRENT_NODE" != "$LATEST_NODE" ]]; then
            echo "Node.js update available: ${CURRENT_NODE} -> ${LATEST_NODE}"
            find . -name "Dockerfile*" -exec sed -i "s|node:${CURRENT_NODE}|node:${LATEST_NODE}|g" {} \;
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.docker-updates.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.BOT_PAT }}
          commit-message: 'chore(deps): update Docker base images'
          title: 'chore(deps): update Docker base images'
          body: |
            ## Docker Base Image Update
            
            Updated base images to latest versions for security patches.
          branch: deps/docker-update-${{ github.run_number }}
          labels: |
            dependencies
            docker
            automated
