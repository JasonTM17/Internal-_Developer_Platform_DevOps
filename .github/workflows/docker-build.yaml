name: Docker Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/*/Dockerfile'
      - 'apps/*/Dockerfile.*'
      - 'apps/*/src/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/*/Dockerfile'
      - 'apps/*/Dockerfile.*'

env:
  REGISTRY: ghcr.io
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  detect-services:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          SERVICES=$(git diff --name-only HEAD~1 | grep -oP '^apps/\K[^/]+' | sort -u | jq -R -s -c 'split("\n")[:-1]')
          if [[ "$SERVICES" == "[]" ]]; then
            SERVICES='["api","portal"]'
          fi
          echo "services=${SERVICES}" >> $GITHUB_OUTPUT

  build:
    name: Build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-services
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}/idp-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.service }}-${{ matrix.platform }},mode=max
          build-args: |
            NODE_ENV=production
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests/${{ matrix.service }}
          DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ github.repository }}/idp-${{ matrix.service }}:${{ github.sha }} --format '{{.Digest}}')
          echo "${DIGEST}" > /tmp/digests/${{ matrix.service }}/${{ matrix.platform }}

  scan:
    name: Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-services, build]
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ github.repository }}/idp-${{ matrix.service }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'container-${{ matrix.service }}'

      - name: Run Dockle linter
        uses: erzz/dockle-action@v1
        with:
          image: '${{ env.REGISTRY }}/${{ github.repository }}/idp-${{ matrix.service }}:${{ github.sha }}'
          failure-threshold: WARN
          accept-filenames: 'package-lock.json'

  sbom:
    name: Generate SBOM - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-services, build]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}
    steps:
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: '${{ env.REGISTRY }}/${{ github.repository }}/idp-${{ matrix.service }}:${{ github.sha }}'
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

      - name: Attest SBOM
        uses: actions/attest-sbom@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/idp-${{ matrix.service }}
          subject-digest: sha256:${{ github.sha }}
          sbom-path: sbom-${{ matrix.service }}.spdx.json
