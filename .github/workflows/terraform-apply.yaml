name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      auto_approve:
        description: 'Auto-approve (dev only)'
        required: false
        type: boolean
        default: false

concurrency:
  group: terraform-apply-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.7.0'
  TF_WORKING_DIR: infra/terraform
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  determine-environments:
    name: Determine Environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.envs.outputs.environments }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine target environments
        id: envs
        run: |
          if [[ -n "${{ github.event.inputs.environment }}" ]]; then
            echo 'environments=["${{ github.event.inputs.environment }}"]' >> $GITHUB_OUTPUT
          else
            # On push to main, only apply to dev automatically
            CHANGED=$(git diff --name-only HEAD~1 -- infra/terraform/ | \
              grep -oP 'environments/\K[^/]+' | sort -u)
            
            # Only auto-apply to dev; staging/production require manual trigger
            ENVS=$(echo "$CHANGED" | grep -E '^dev$' | jq -R -s -c 'split("\n")[:-1]')
            if [[ "$ENVS" == "[]" ]] || [[ -z "$ENVS" ]]; then
              echo 'environments=["dev"]' >> $GITHUB_OUTPUT
            else
              echo "environments=${ENVS}" >> $GITHUB_OUTPUT
            fi
          fi

  apply:
    name: Apply - ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: determine-environments
    strategy:
      matrix:
        environment: ${{ fromJson(needs.determine-environments.outputs.environments) }}
      max-parallel: 1
    environment: terraform-${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=idp-terraform-state-${{ matrix.environment }}" \
            -backend-config="key=infrastructure/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=terraform-locks"
        working-directory: ${{ env.TF_WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Capture outputs
        id: outputs
        run: |
          terraform output -json > tf-outputs.json
          echo "outputs=$(cat tf-outputs.json)" >> $GITHUB_OUTPUT
        working-directory: ${{ env.TF_WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Update SSM parameters
        run: |
          # Store terraform outputs in SSM for application consumption
          for key in $(jq -r 'keys[]' tf-outputs.json); do
            VALUE=$(jq -r ".${key}.value" tf-outputs.json)
            aws ssm put-parameter \
              --name "/idp/${{ matrix.environment }}/terraform/${key}" \
              --value "${VALUE}" \
              --type "String" \
              --overwrite
          done
        working-directory: ${{ env.TF_WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Post-apply verification
        run: |
          echo "Verifying infrastructure state..."
          terraform plan -var-file="terraform.tfvars" -detailed-exitcode -no-color
          if [[ $? -eq 0 ]]; then
            echo "✅ Infrastructure is in desired state"
          else
            echo "::warning::Infrastructure drift detected after apply"
          fi
        working-directory: ${{ env.TF_WORKING_DIR }}/environments/${{ matrix.environment }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: apply
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Terraform Apply ${{ needs.apply.result == 'success' && '✅' || '❌' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Terraform Apply*\n*Environments:* ${{ needs.determine-environments.outputs.environments }}\n*Status:* ${{ needs.apply.result }}\n*Actor:* ${{ github.actor }}\n*Commit:* `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
