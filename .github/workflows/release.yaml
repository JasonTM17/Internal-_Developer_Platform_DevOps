name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
      channel: ${{ steps.release.outputs.new_release_channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify conditions
        run: |
          # Ensure CI passed for this commit
          echo "Verifying CI status for commit ${{ github.sha }}..."

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

      - name: Generate release notes
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          echo "## Release v${{ steps.release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.release.outputs.new_release_notes }}" >> $GITHUB_STEP_SUMMARY

  build-release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release == 'true'
    strategy:
      matrix:
        service: [api, portal]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/idp-${{ matrix.service }}:v${{ needs.release.outputs.version }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/idp-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/idp-${{ matrix.service }}:v${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository }}/idp-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            VERSION=v${{ needs.release.outputs.version }}
          labels: |
            org.opencontainers.image.title=IDP ${{ matrix.service }}
            org.opencontainers.image.version=v${{ needs.release.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Sign container image
        run: |
          cosign sign --yes \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/idp-${{ matrix.service }}:v${{ needs.release.outputs.version }}
        env:
          COSIGN_EXPERIMENTAL: 1

  update-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [release, build-release-artifacts]
    if: needs.release.outputs.new_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Update Helm values
        run: |
          VERSION="v${{ needs.release.outputs.version }}"
          
          # Update staging values to trigger ArgoCD sync
          yq e ".image.tag = \"${VERSION}\"" -i infra/helm/idp-platform/values-staging.yaml
          
          echo "Updated staging manifests to ${VERSION}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore(release): update manifests to v${{ needs.release.outputs.version }}" || true
          git push

  notify:
    name: Release Notification
    runs-on: ubuntu-latest
    needs: [release, build-release-artifacts, update-manifests]
    if: needs.release.outputs.new_release == 'true'
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "New Release: v${{ needs.release.outputs.version }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "Release v${{ needs.release.outputs.version }}" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Channel:* ${{ needs.release.outputs.channel || 'latest' }}\n*Images:* Published to ECR + GHCR\n*Manifests:* Updated for staging deployment\n\n<${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.release.outputs.version }}|View Release>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
