apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/component: service-monitor
    team: platform
    release: prometheus
spec:
  jobLabel: postgres
  namespaceSelector:
    matchNames:
      - platform
      - databases
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 15s
      honorLabels: true
      metricRelabelings:
        # Keep only essential metrics to control cardinality
        - sourceLabels: [__name__]
          regex: "pg_stat_database_.*|pg_stat_activity_.*|pg_locks_.*|pg_replication_.*|pg_database_size_.*|pg_settings_.*|pg_up"
          action: keep
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_database]
          targetLabel: database
        - sourceLabels: [__meta_kubernetes_pod_label_cluster]
          targetLabel: pg_cluster

---
# PrometheusRule for PostgreSQL alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: postgres-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: postgres-exporter
    prometheus: platform
    role: alert-rules
spec:
  groups:
    - name: postgres.alerts
      rules:
        - alert: PostgresDown
          expr: pg_up == 0
          for: 1m
          labels:
            severity: critical
            team: platform
            runbook: https://wiki.internal/runbooks/postgres-down
          annotations:
            summary: "PostgreSQL instance is down"
            description: "PostgreSQL instance {{ $labels.instance }} is unreachable"

        - alert: PostgresHighConnections
          expr: |
            pg_stat_activity_count / pg_settings_max_connections > 0.8
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "PostgreSQL connection pool above 80%"
            description: "{{ $labels.datname }} using {{ $value | humanizePercentage }} of max connections"

        - alert: PostgresConnectionPoolExhausted
          expr: |
            pg_stat_activity_count / pg_settings_max_connections > 0.95
          for: 2m
          labels:
            severity: critical
            team: platform
            runbook: https://wiki.internal/runbooks/postgres-connections
          annotations:
            summary: "PostgreSQL connection pool nearly exhausted"
            description: "{{ $labels.datname }} at {{ $value | humanizePercentage }} capacity"

        - alert: PostgresReplicationLag
          expr: pg_replication_lag_bytes > 104857600
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "PostgreSQL replication lag above 100MB"
            description: "Replication lag is {{ $value | humanize1024 }}B"

        - alert: PostgresReplicationLagCritical
          expr: pg_replication_lag_bytes > 1073741824
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "PostgreSQL replication lag above 1GB"
            description: "Replication lag is {{ $value | humanize1024 }}B - data loss risk"

        - alert: PostgresLowCacheHitRatio
          expr: |
            pg_stat_database_blks_hit
            / (pg_stat_database_blks_hit + pg_stat_database_blks_read) < 0.9
          for: 15m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "PostgreSQL cache hit ratio below 90%"
            description: "Database {{ $labels.datname }} cache hit ratio is {{ $value | humanizePercentage }}"

        - alert: PostgresHighRollbackRate
          expr: |
            rate(pg_stat_database_xact_rollback[5m])
            / (rate(pg_stat_database_xact_commit[5m]) + rate(pg_stat_database_xact_rollback[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "PostgreSQL rollback rate above 5%"
            description: "Database {{ $labels.datname }} rollback rate is {{ $value | humanizePercentage }}"

        - alert: PostgresDeadlocks
          expr: rate(pg_stat_database_deadlocks[5m]) > 0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "PostgreSQL deadlocks detected"
            description: "Database {{ $labels.datname }} experiencing {{ $value | printf \"%.2f\" }} deadlocks/sec"

        - alert: PostgresDiskSpaceLow
          expr: |
            pg_database_size_bytes / (1024 * 1024 * 1024) > 50
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "PostgreSQL database size above 50GB"
            description: "Database {{ $labels.datname }} is {{ $value | printf \"%.1f\" }}GB"

        - alert: PostgresLongRunningQueries
          expr: |
            pg_stat_activity_count{state="active", wait_event_type!="Lock"}
            and
            (time() - pg_stat_activity_max_tx_duration) > 300
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "PostgreSQL has long-running queries (>5 min)"
            description: "Active queries running longer than 5 minutes detected"
