global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: idp-local
    environment: development

rule_files:
  - /etc/prometheus/alerting-rules.yml
  - /etc/prometheus/recording-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # IDP API service (local Docker)
  - job_name: 'idp-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:3000']
        labels:
          service: idp-api
          environment: development

  # Node Exporter (if running)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Redis (via exporter if available)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: redis
