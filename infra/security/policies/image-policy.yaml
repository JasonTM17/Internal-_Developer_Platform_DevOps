---
# Image Policy - Restrict container images to approved registries
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sallowedregistries
spec:
  crd:
    spec:
      names:
        kind: K8sAllowedRegistries
      validation:
        openAPIV3Schema:
          type: object
          properties:
            registries:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sallowedregistries

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not registry_allowed(container.image)
          msg := sprintf("Image '%v' is from an unauthorized registry. Allowed registries: %v", [container.image, input.parameters.registries])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          not registry_allowed(container.image)
          msg := sprintf("Init container image '%v' is from an unauthorized registry", [container.image])
        }

        registry_allowed(image) {
          registry := input.parameters.registries[_]
          startswith(image, registry)
        }
---
# Enforce allowed registries in production
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAllowedRegistries
metadata:
  name: allowed-registries-production
spec:
  match:
    kinds:
      - apiGroups: ['']
        kinds: ['Pod']
    namespaces: ['idp-production']
  parameters:
    registries:
      - '123456789012.dkr.ecr.us-east-1.amazonaws.com/'
      - 'ghcr.io/jasontm17/'
      - 'docker.io/library/' # Official Docker images only
      - 'quay.io/prometheus/'
      - 'grafana/'
      - 'registry.k8s.io/'
---
# Slightly more permissive for staging (allows dev registry)
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAllowedRegistries
metadata:
  name: allowed-registries-staging
spec:
  match:
    kinds:
      - apiGroups: ['']
        kinds: ['Pod']
    namespaces: ['idp-staging']
  parameters:
    registries:
      - '123456789012.dkr.ecr.us-east-1.amazonaws.com/'
      - 'ghcr.io/jasontm17/'
      - 'docker.io/library/'
      - 'quay.io/'
      - 'grafana/'
      - 'registry.k8s.io/'
---
# Image pull policy enforcement
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8simagepullpolicy
spec:
  crd:
    spec:
      names:
        kind: K8sImagePullPolicy
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8simagepullpolicy

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          container.imagePullPolicy != "Always"
          not contains(container.image, "@sha256:")
          msg := sprintf("Container %v must use imagePullPolicy: Always or reference image by digest", [container.name])
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sImagePullPolicy
metadata:
  name: require-always-pull
spec:
  match:
    kinds:
      - apiGroups: ['']
        kinds: ['Pod']
    namespaces: ['idp-production']
