# Staging environment overrides for idp-api
replicaCount: 2

image:
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 1

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "200"
  hosts:
    - host: api.staging.idp.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: idp-api-staging-tls
      hosts:
        - api.staging.idp.company.com

env:
  - name: NODE_ENV
    value: "staging"
  - name: PORT
    value: "3000"
  - name: LOG_LEVEL
    value: "info"
  - name: LOG_FORMAT
    value: "json"

configMap:
  data:
    DATABASE_POOL_SIZE: "10"
    CACHE_TTL: "180"
    CORS_ORIGINS: "https://portal.staging.idp.company.com"
    RATE_LIMIT_MAX: "200"
    RATE_LIMIT_WINDOW_MS: "60000"

externalSecret:
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: idp/staging/api/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: idp/staging/api/redis-url
    - secretKey: JWT_SECRET
      remoteRef:
        key: idp/staging/api/jwt-secret

serviceMonitor:
  enabled: true
  interval: 30s
