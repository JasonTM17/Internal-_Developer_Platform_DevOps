# Production environment overrides for idp-api
replicaCount: 3

image:
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 5
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 30
          periodSeconds: 60

podDisruptionBudget:
  enabled: true
  minAvailable: 2

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - idp-api
        topologyKey: kubernetes.io/hostname
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - idp-api
          topologyKey: topology.kubernetes.io/zone

nodeSelector:
  kubernetes.io/os: linux
  node-role.kubernetes.io/workload: "true"

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "production"
    effect: "NoSchedule"

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
  hosts:
    - host: api.idp.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: idp-api-prod-tls
      hosts:
        - api.idp.company.com

env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "3000"
  - name: LOG_LEVEL
    value: "warn"
  - name: LOG_FORMAT
    value: "json"

configMap:
  data:
    DATABASE_POOL_SIZE: "25"
    CACHE_TTL: "600"
    CORS_ORIGINS: "https://portal.idp.company.com"
    RATE_LIMIT_MAX: "100"
    RATE_LIMIT_WINDOW_MS: "60000"

externalSecret:
  refreshInterval: 30m
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: idp/production/api/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: idp/production/api/redis-url
    - secretKey: JWT_SECRET
      remoteRef:
        key: idp/production/api/jwt-secret
    - secretKey: SENTRY_DSN
      remoteRef:
        key: idp/production/api/sentry-dsn

serviceMonitor:
  enabled: true
  interval: 15s

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
