# Default values for idp-api
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: ghcr.io/company/idp-api
  pullPolicy: IfNotPresent
  tag: ""  # Overridden by appVersion in Chart.yaml

imagePullSecrets:
  - name: ghcr-credentials

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations:
    eks.amazonaws.com/role-arn: ""
  name: "idp-api"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"
  sidecar.istio.io/inject: "true"

podLabels:
  app.kubernetes.io/part-of: internal-developer-platform
  app.kubernetes.io/component: api

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: api.idp.company.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: idp-api-tls
      hosts:
        - api.idp.company.com

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

podDisruptionBudget:
  enabled: true
  minAvailable: 1

nodeSelector:
  kubernetes.io/os: linux

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - idp-api
          topologyKey: kubernetes.io/hostname

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "3000"
  - name: LOG_LEVEL
    value: "info"
  - name: LOG_FORMAT
    value: "json"

envFrom: []

configMap:
  enabled: true
  data:
    DATABASE_POOL_SIZE: "10"
    CACHE_TTL: "300"
    CORS_ORIGINS: "https://portal.idp.company.com"
    RATE_LIMIT_MAX: "100"
    RATE_LIMIT_WINDOW_MS: "60000"

externalSecret:
  enabled: true
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  refreshInterval: 1h
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: idp/api/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: idp/api/redis-url
    - secretKey: JWT_SECRET
      remoteRef:
        key: idp/api/jwt-secret

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
  port: metrics

postgresql:
  enabled: false

redis:
  enabled: false
