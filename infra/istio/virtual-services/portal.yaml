apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: portal-virtualservice
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: idp-portal
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: istio
spec:
  hosts:
    - "portal.idp.example.com"
  gateways:
    - idp-gateway
  http:
    # Static assets with aggressive caching
    - name: static-assets
      match:
        - uri:
            prefix: /static/
        - uri:
            regex: ".*\\.(js|css|png|jpg|svg|woff2|ico)$"
      route:
        - destination:
            host: idp-portal.idp-platform.svc.cluster.local
            subset: stable
            port:
              number: 3001
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: gateway-error,connect-failure,refused-stream
      headers:
        response:
          set:
            cache-control: "public, max-age=31536000, immutable"
            x-content-type-options: nosniff

    # Next.js API routes (BFF pattern)
    - name: bff-api
      match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: idp-portal.idp-platform.svc.cluster.local
            subset: stable
            port:
              number: 3001
      timeout: 30s
      retries:
        attempts: 2
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,refused-stream
      corsPolicy:
        allowOrigins:
          - exact: "https://portal.idp.example.com"
        allowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        allowHeaders:
          - authorization
          - content-type
          - x-request-id
        maxAge: "3600"
        allowCredentials: true

    # Authentication callback routes
    - name: auth-callback
      match:
        - uri:
            prefix: /auth/
      route:
        - destination:
            host: idp-portal.idp-platform.svc.cluster.local
            subset: stable
            port:
              number: 3001
      timeout: 15s
      retries:
        attempts: 2
        perTryTimeout: 7s

    # Canary traffic for portal (header-based)
    - name: portal-canary
      match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: idp-portal.idp-platform.svc.cluster.local
            subset: canary
            port:
              number: 3001
      timeout: 15s

    # Primary portal route with weighted traffic
    - name: portal-primary
      route:
        - destination:
            host: idp-portal.idp-platform.svc.cluster.local
            subset: stable
            port:
              number: 3001
          weight: 100
        - destination:
            host: idp-portal.idp-platform.svc.cluster.local
            subset: canary
            port:
              number: 3001
          weight: 0
      timeout: 15s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure,refused-stream
      headers:
        response:
          set:
            strict-transport-security: "max-age=31536000; includeSubDomains; preload"
            x-content-type-options: nosniff
            x-frame-options: SAMEORIGIN
            x-xss-protection: "1; mode=block"
            referrer-policy: strict-origin-when-cross-origin
            permissions-policy: "camera=(), microphone=(), geolocation=()"
            content-security-policy: >-
              default-src 'self';
              script-src 'self' 'unsafe-inline' 'unsafe-eval';
              style-src 'self' 'unsafe-inline';
              img-src 'self' data: https:;
              font-src 'self' data:;
              connect-src 'self' https://api.idp.example.com wss://api.idp.example.com;
              frame-ancestors 'self'
