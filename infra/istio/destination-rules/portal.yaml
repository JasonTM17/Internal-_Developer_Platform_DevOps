apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: idp-portal-destination
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: idp-portal
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: istio
spec:
  host: idp-portal.idp-platform.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 2000
        connectTimeout: 5s
        tcpKeepalive:
          time: 7200s
          interval: 75s
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 2048
        http2MaxRequests: 2048
        maxRequestsPerConnection: 200
        maxRetries: 3
        idleTimeout: 120s
    loadBalancer:
      simple: ROUND_ROBIN
      localityLbSetting:
        enabled: true
        distribute:
          - from: "us-east-1/*"
            to:
              "us-east-1/*": 80
              "us-west-2/*": 20
          - from: "us-west-2/*"
            to:
              "us-west-2/*": 80
              "us-east-1/*": 20
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 15s
      baseEjectionTime: 30s
      maxEjectionPercent: 30
      minHealthPercent: 50
    tls:
      mode: ISTIO_MUTUAL
      subjectAltNames:
        - spiffe://idp.cluster.local/ns/idp-platform/sa/idp-portal

  subsets:
    - name: stable
      labels:
        app: idp-portal
        version: stable
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 2000
          http:
            http1MaxPendingRequests: 2048
            http2MaxRequests: 2048
            maxRequestsPerConnection: 200
        outlierDetection:
          consecutive5xxErrors: 5
          interval: 15s
          baseEjectionTime: 30s
          maxEjectionPercent: 30

    - name: canary
      labels:
        app: idp-portal
        version: canary
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 200
          http:
            http1MaxPendingRequests: 256
            http2MaxRequests: 256
            maxRequestsPerConnection: 100
        outlierDetection:
          consecutive5xxErrors: 3
          interval: 10s
          baseEjectionTime: 60s
          maxEjectionPercent: 100
