apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: idp-gateway
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: idp-gateway
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: istio
spec:
  selector:
    istio: ingressgateway
  servers:
    # HTTPS server for production traffic
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: idp-platform-tls
        minProtocolVersion: TLSV1_2
        maxProtocolVersion: TLSV1_3
        cipherSuites:
          - ECDHE-ECDSA-AES256-GCM-SHA384
          - ECDHE-RSA-AES256-GCM-SHA384
          - ECDHE-ECDSA-CHACHA20-POLY1305
          - ECDHE-RSA-CHACHA20-POLY1305
          - ECDHE-ECDSA-AES128-GCM-SHA256
          - ECDHE-RSA-AES128-GCM-SHA256
      hosts:
        - "api.idp.example.com"
        - "portal.idp.example.com"
        - "grafana.idp.example.com"
        - "argocd.idp.example.com"

    # HTTP server with redirect to HTTPS
    - port:
        number: 80
        name: http
        protocol: HTTP
      tls:
        httpsRedirect: true
      hosts:
        - "api.idp.example.com"
        - "portal.idp.example.com"
        - "grafana.idp.example.com"
        - "argocd.idp.example.com"

    # Internal gRPC server for service-to-service communication
    - port:
        number: 8443
        name: grpc-internal
        protocol: HTTPS
      tls:
        mode: MUTUAL
        credentialName: idp-internal-mtls
        minProtocolVersion: TLSV1_3
      hosts:
        - "internal.idp.svc.cluster.local"
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: idp-internal-gateway
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: idp-internal-gateway
    app.kubernetes.io/part-of: idp-platform
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 15443
        name: tls-passthrough
        protocol: TLS
      tls:
        mode: AUTO_PASSTHROUGH
      hosts:
        - "*.idp.global"
