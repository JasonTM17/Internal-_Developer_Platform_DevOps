# Egress traffic policy for external database (RDS)
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: rds-database
  namespace: idp-data
  labels:
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: istio
    networking.istio.io/traffic-type: external
spec:
  hosts:
    - idp-primary.cluster-abc123.us-east-1.rds.amazonaws.com
    - idp-replica.cluster-ro-abc123.us-east-1.rds.amazonaws.com
  ports:
    - number: 5432
      name: tcp-postgres
      protocol: TCP
  location: MESH_EXTERNAL
  resolution: DNS
  exportTo:
    - "."
    - "idp-platform"
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: github-api-tls
  namespace: idp-platform
spec:
  host: api.github.com
  trafficPolicy:
    tls:
      mode: SIMPLE
      sni: api.github.com
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 10s
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 60s
