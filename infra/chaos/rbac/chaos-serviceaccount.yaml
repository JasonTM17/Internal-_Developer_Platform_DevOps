apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-serviceaccount
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: chaos-serviceaccount
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: litmus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaos-cluster-role
  labels:
    app.kubernetes.io/name: chaos-cluster-role
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: litmus
rules:
  # Pod-level chaos experiments
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]

  # Deployment and ReplicaSet management
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Job management for chaos experiments
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete", "deletecollection"]

  # Litmus CRDs
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines", "chaosexperiments", "chaosresults", "chaosschedules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Network policies for network chaos
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]

  # Node operations for node-level chaos
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]

  # HPA for autoscaling validation
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]

  # PDB for disruption budget validation
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-cluster-role-binding
  labels:
    app.kubernetes.io/name: chaos-cluster-role-binding
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: litmus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chaos-cluster-role
subjects:
  - kind: ServiceAccount
    name: chaos-serviceaccount
    namespace: idp-platform
---
# Namespace-scoped role for additional permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-namespace-role
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: chaos-namespace-role
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: litmus
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["litmuschaos.io"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-namespace-role-binding
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: chaos-namespace-role-binding
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: litmus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-namespace-role
subjects:
  - kind: ServiceAccount
    name: chaos-serviceaccount
    namespace: idp-platform
---
# Network policy to allow chaos runner communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-chaos-runner
  namespace: idp-platform
  labels:
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: litmus
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: idp-platform
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: experiment-job
      ports:
        - protocol: TCP
  policyTypes:
    - Ingress
