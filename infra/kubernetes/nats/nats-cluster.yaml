apiVersion: v1
kind: Namespace
metadata:
  name: nats-system
  labels:
    app.kubernetes.io/part-of: idp-platform
    istio-injection: enabled
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/component: messaging
spec:
  replicas: 3
  serviceName: nats
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/part-of: idp-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7777"
    spec:
      serviceAccountName: nats
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: nats
          image: nats:2.10.7-alpine
          ports:
            - name: client
              containerPort: 4222
            - name: cluster
              containerPort: 6222
            - name: monitor
              containerPort: 8222
            - name: metrics
              containerPort: 7777
            - name: leafnodes
              containerPort: 7422
            - name: websocket
              containerPort: 8080
          args:
            - --config
            - /etc/nats-config/nats.conf
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLUSTER_ADVERTISE
              value: "$(POD_NAME).nats.$(POD_NAMESPACE).svc.cluster.local"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz?js-enabled-only=true
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: config
              mountPath: /etc/nats-config
            - name: jetstream-data
              mountPath: /data/jetstream
            - name: pid
              mountPath: /var/run/nats
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
        - name: nats-exporter
          image: natsio/prometheus-nats-exporter:0.14.0
          args:
            - -connz
            - -routez
            - -subz
            - -varz
            - -jsz=all
            - -port=7777
            - http://localhost:8222
          ports:
            - name: metrics
              containerPort: 7777
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: pid
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: nats
  volumeClaimTemplates:
    - metadata:
        name: jetstream-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3-encrypted
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: idp-platform
data:
  nats.conf: |
    # NATS Server Configuration for IDP Platform
    server_name: $POD_NAME
    listen: 0.0.0.0:4222
    http: 0.0.0.0:8222

    # JetStream Configuration
    jetstream {
      store_dir: /data/jetstream
      max_mem: 512MB
      max_file: 10GB
      domain: idp
    }

    # Cluster Configuration
    cluster {
      name: idp-nats-cluster
      listen: 0.0.0.0:6222
      routes: [
        nats-route://nats-0.nats.idp-platform.svc.cluster.local:6222
        nats-route://nats-1.nats.idp-platform.svc.cluster.local:6222
        nats-route://nats-2.nats.idp-platform.svc.cluster.local:6222
      ]
      cluster_advertise: $CLUSTER_ADVERTISE
      connect_retries: 120
    }

    # Leaf Nodes (for external connections)
    leafnodes {
      listen: 0.0.0.0:7422
    }

    # WebSocket support
    websocket {
      listen: 0.0.0.0:8080
      no_tls: true
    }

    # Logging
    logtime: true
    debug: false
    trace: false
    logfile_size_limit: 100MB

    # Limits
    max_payload: 1MB
    max_connections: 10000
    max_subscriptions: 0
    ping_interval: 30s
    ping_max: 3
    write_deadline: 10s

    # Authorization (using accounts)
    include ./accounts.conf
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: idp-platform
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: cluster
      port: 6222
      targetPort: cluster
    - name: monitor
      port: 8222
      targetPort: monitor
    - name: metrics
      port: 7777
      targetPort: metrics
  selector:
    app.kubernetes.io/name: nats
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nats
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: idp-platform
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nats
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: nats
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
