apiVersion: v1
kind: LimitRange
metadata:
  name: default-container-limits
  namespace: platform
  labels:
    app.kubernetes.io/part-of: internal-developer-platform
  annotations:
    description: "Default resource limits for containers without explicit resource specs"
    policy.idp.io/enforcement: "automatic"
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
    - type: PersistentVolumeClaim
      max:
        storage: "50Gi"
      min:
        storage: "1Gi"
