apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-resource-quota
  namespace: platform
  labels:
    app.kubernetes.io/part-of: internal-developer-platform
    environment: production
  annotations:
    description: "Resource quota for production environment - full capacity allocation"
    quota.idp.io/tier: "production"
    quota.idp.io/contact: "platform-engineering@company.com"
    quota.idp.io/escalation: "sre-oncall@company.com"
spec:
  hard:
    # Compute resources - full production capacity
    requests.cpu: "32"
    requests.memory: "64Gi"
    limits.cpu: "64"
    limits.memory: "128Gi"
    # Object counts
    pods: "200"
    services: "50"
    configmaps: "100"
    secrets: "50"
    persistentvolumeclaims: "30"
    replicationcontrollers: "50"
    # Service types
    services.nodeports: "0"
    services.loadbalancers: "5"
  scopeSelector:
    matchExpressions:
      - scopeName: PriorityClass
        operator: NotIn
        values:
          - platform-critical
