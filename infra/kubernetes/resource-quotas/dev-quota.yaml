apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-resource-quota
  namespace: platform
  labels:
    app.kubernetes.io/part-of: internal-developer-platform
    environment: dev
  annotations:
    description: "Resource quota for development environment workloads"
    quota.idp.io/tier: "development"
    quota.idp.io/contact: "platform-engineering@company.com"
spec:
  hard:
    # Compute resources
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    # Object counts
    pods: "30"
    services: "15"
    configmaps: "30"
    secrets: "20"
    persistentvolumeclaims: "10"
    replicationcontrollers: "10"
    # Service types
    services.nodeports: "0"
    services.loadbalancers: "2"
  scopeSelector:
    matchExpressions:
      - scopeName: PriorityClass
        operator: NotIn
        values:
          - platform-critical
