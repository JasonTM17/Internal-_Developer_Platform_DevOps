apiVersion: v1
kind: ServiceAccount
metadata:
  name: idp-api
  namespace: platform
  labels:
    app.kubernetes.io/name: idp-api
    app.kubernetes.io/part-of: internal-developer-platform
    app.kubernetes.io/component: api
  annotations:
    description: "Service account for IDP API service"
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/idp-api-role"
automountServiceAccountToken: false
---
