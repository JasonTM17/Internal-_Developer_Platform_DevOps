apiVersion: v1
kind: Namespace
metadata:
  name: ingress
  labels:
    app.kubernetes.io/part-of: internal-developer-platform
    app.kubernetes.io/managed-by: helm
    purpose: ingress
    team: platform-engineering
    istio-injection: disabled
  annotations:
    description: "Ingress controller namespace - NGINX/Envoy gateway"
    owner: platform-engineering@company.com
    cost-center: "engineering-platform"
    security.policy/level: "baseline"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ingress-quota
  namespace: ingress
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "20"
    services.loadbalancers: "5"
