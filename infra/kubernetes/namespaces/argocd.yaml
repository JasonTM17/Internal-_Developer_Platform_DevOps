apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    app.kubernetes.io/part-of: internal-developer-platform
    app.kubernetes.io/managed-by: helm
    purpose: gitops
    team: platform-engineering
    istio-injection: disabled
  annotations:
    description: "ArgoCD GitOps controller namespace"
    owner: platform-engineering@company.com
    cost-center: "engineering-platform"
    security.policy/level: "restricted"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-allow-internal
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              purpose: gitops
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
  egress:
    - {}
