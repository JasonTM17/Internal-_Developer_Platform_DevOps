apiVersion: types.kubefed.io/v1beta1
kind: FederatedDeployment
metadata:
  name: idp-api
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: idp-api
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: kubefed
spec:
  template:
    metadata:
      labels:
        app: idp-api
        version: stable
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: idp-api
      template:
        metadata:
          labels:
            app: idp-api
            version: stable
          annotations:
            sidecar.istio.io/inject: "true"
            prometheus.io/scrape: "true"
            prometheus.io/port: "3000"
        spec:
          serviceAccountName: idp-api
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: idp-api
              image: ghcr.io/idp-platform/api:latest
              ports:
                - name: http
                  containerPort: 3000
                  protocol: TCP
              env:
                - name: NODE_ENV
                  value: production
                - name: PORT
                  value: "3000"
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: idp-api-secrets
                      key: database-url
                - name: REDIS_URL
                  valueFrom:
                    secretKeyRef:
                      name: idp-api-secrets
                      key: redis-url
                - name: NATS_URL
                  value: "nats://nats.idp-platform.svc.cluster.local:4222"
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: http
                initialDelaySeconds: 15
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
              readinessProbe:
                httpGet:
                  path: /readyz
                  port: http
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 3
              startupProbe:
                httpGet:
                  path: /healthz
                  port: http
                initialDelaySeconds: 10
                periodSeconds: 5
                failureThreshold: 30
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app: idp-api
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app: idp-api
  placement:
    clusters:
      - name: idp-primary
      - name: idp-secondary
    clusterSelector:
      matchLabels:
        federation/role: ""
  overrides:
    - clusterName: idp-primary
      clusterOverrides:
        - path: "/spec/replicas"
          value: 4
        - path: "/spec/template/spec/containers/0/env/-"
          value:
            name: CLUSTER_ROLE
            value: "primary"
        - path: "/spec/template/spec/containers/0/env/-"
          value:
            name: CLUSTER_REGION
            value: "us-east-1"
    - clusterName: idp-secondary
      clusterOverrides:
        - path: "/spec/replicas"
          value: 2
        - path: "/spec/template/spec/containers/0/env/-"
          value:
            name: CLUSTER_ROLE
            value: "secondary"
        - path: "/spec/template/spec/containers/0/env/-"
          value:
            name: CLUSTER_REGION
            value: "us-west-2"
---
apiVersion: types.kubefed.io/v1beta1
kind: FederatedService
metadata:
  name: idp-api
  namespace: idp-platform
  labels:
    app.kubernetes.io/name: idp-api
    app.kubernetes.io/part-of: idp-platform
    app.kubernetes.io/managed-by: kubefed
spec:
  template:
    metadata:
      labels:
        app: idp-api
    spec:
      type: ClusterIP
      ports:
        - name: http
          port: 3000
          targetPort: http
          protocol: TCP
      selector:
        app: idp-api
  placement:
    clusters:
      - name: idp-primary
      - name: idp-secondary
