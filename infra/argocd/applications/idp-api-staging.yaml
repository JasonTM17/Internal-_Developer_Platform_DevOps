apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-api-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: internal-developer-platform
    app.kubernetes.io/component: api
    environment: staging
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: platform-staging
    notifications.argoproj.io/subscribe.on-sync-failed.slack: platform-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: platform-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: internal-developer-platform
  source:
    repoURL: https://github.com/company/internal-developer-platform.git
    targetRevision: release/*
    path: infra/helm/idp-api
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
      parameters:
        - name: image.tag
          value: ""  # Set by CI pipeline
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics
