apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-api-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: internal-developer-platform
    app.kubernetes.io/component: api
    environment: dev
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: platform-dev
    notifications.argoproj.io/subscribe.on-health-degraded.slack: platform-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: internal-developer-platform
  source:
    repoURL: https://github.com/company/internal-developer-platform.git
    targetRevision: develop
    path: infra/helm/idp-api
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      parameters:
        - name: image.tag
          value: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/metrics
