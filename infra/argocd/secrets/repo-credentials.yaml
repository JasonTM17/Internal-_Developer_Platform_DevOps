apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: repo-credentials
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/component: repo-credentials
    argocd.argoproj.io/secret-type: repository
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # Sealed with kubeseal - these are encrypted values
    # Original secret contains: url, username, password/sshPrivateKey
    url: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...ENCRYPTED...
    type: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...ENCRYPTED...
    username: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...ENCRYPTED...
    password: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...ENCRYPTED...
  template:
    metadata:
      name: repo-credentials
      namespace: argocd
      labels:
        argocd.argoproj.io/secret-type: repository
    type: Opaque

---
# Template for creating the sealed secret (for documentation)
# DO NOT commit the unsealed version - use kubeseal to encrypt
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: repo-credentials
#   namespace: argocd
#   labels:
#     argocd.argoproj.io/secret-type: repository
# type: Opaque
# stringData:
#   url: https://github.com/company/platform-gitops.git
#   type: git
#   username: argocd-bot
#   password: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#
# Seal with:
#   kubeseal --format yaml \
#     --controller-name sealed-secrets \
#     --controller-namespace kube-system \
#     < repo-credentials-unsealed.yaml \
#     > repo-credentials.yaml

