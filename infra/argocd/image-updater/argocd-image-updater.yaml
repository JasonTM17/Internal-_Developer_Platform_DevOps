apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/part-of: argocd
data:
  # Registry configuration
  registries.conf: |
    registries:
      - name: ECR Production
        api_url: https://123456789012.dkr.ecr.us-east-1.amazonaws.com
        prefix: 123456789012.dkr.ecr.us-east-1.amazonaws.com
        credentials: ext:/scripts/ecr-login.sh
        default: true
        insecure: false
        
      - name: GitHub Container Registry
        api_url: https://ghcr.io
        prefix: ghcr.io/company
        credentials: secret:argocd/ghcr-credentials#token
        insecure: false

  # Application configuration
  applications.conf: |
    # Payment Service - Critical tier, canary updates
    - application: platform/payment-service
      image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/payment-service
      update-strategy: semver
      allow-tags: regexp:^v[0-9]+\.[0-9]+\.[0-9]+$
      ignore-tags: regexp:^.*-rc\.[0-9]+$
      platforms: linux/amd64
      
    # Auth Service - Critical tier
    - application: platform/auth-service
      image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/auth-service
      update-strategy: semver
      allow-tags: regexp:^v[0-9]+\.[0-9]+\.[0-9]+$
      
    # Portal - Standard tier, latest stable
    - application: platform/portal
      image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/portal
      update-strategy: newest-build
      allow-tags: regexp:^main-[a-f0-9]{8}$
      
    # API Gateway - Critical tier
    - application: platform/api-gateway
      image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/api-gateway
      update-strategy: semver
      allow-tags: regexp:^v[0-9]+\.[0-9]+\.[0-9]+$

  # Log level
  log.level: info

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-image-updater
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-image-updater
    spec:
      serviceAccountName: argocd-image-updater
      containers:
        - name: argocd-image-updater
          image: quay.io/argoprojlabs/argocd-image-updater:v0.12.2
          ports:
            - containerPort: 8080
              name: metrics
          command:
            - /usr/local/bin/argocd-image-updater
            - run
            - --interval=2m
            - --registries-conf-path=/app/config/registries.conf
            - --applications-conf-path=/app/config/applications.conf
          env:
            - name: ARGOCD_GRPC_WEB
              value: "true"
            - name: ARGOCD_SERVER
              value: argocd-server.argocd.svc.cluster.local
            - name: ARGOCD_INSECURE
              value: "true"
            - name: GIT_COMMIT_USER
              value: "argocd-image-updater"
            - name: GIT_COMMIT_EMAIL
              value: "image-updater@platform.internal"
            - name: GIT_COMMIT_MESSAGE
              value: "chore: update image {{.AppName}} to {{.NewVersion}}"
            - name: IMAGE_UPDATER_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: ssh-known-hosts
              mountPath: /app/ssh
            - name: ssh-key
              mountPath: /app/.ssh
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: argocd-image-updater-config
        - name: ssh-known-hosts
          configMap:
            name: argocd-ssh-known-hosts-cm
        - name: ssh-key
          secret:
            secretName: argocd-image-updater-ssh-key
            defaultMode: 0600

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-image-updater
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-image-updater
subjects:
  - kind: ServiceAccount
    name: argocd-image-updater
    namespace: argocd
