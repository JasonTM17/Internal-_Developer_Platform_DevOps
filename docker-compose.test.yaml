version: '3.9'

# =============================================================================
# IDP Platform - Test Environment
# =============================================================================
# Isolated test environment for CI and local test execution.
#
# Usage:
#   docker compose -f docker-compose.test.yaml up -d
#   docker compose -f docker-compose.test.yaml run --rm test-runner
#   docker compose -f docker-compose.test.yaml down -v
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Test Runner
  # ---------------------------------------------------------------------------
  test-runner:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    command: npx turbo test --filter='...'
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test_secret@postgres-test:5432/idp_test
      REDIS_URL: redis://redis-test:6379/0
      JWT_SECRET: test-jwt-secret
      LOG_LEVEL: warn
      CI: "true"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    volumes:
      - ./apps:/app/apps:ro
      - ./packages:/app/packages:ro
      - test_coverage:/app/coverage
    networks:
      - test-network

  # ---------------------------------------------------------------------------
  # Integration Test Runner
  # ---------------------------------------------------------------------------
  integration-tests:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    command: npx turbo test:integration --filter='...'
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://test:test_secret@postgres-test:5432/idp_test
      REDIS_URL: redis://redis-test:6379/0
      JWT_SECRET: test-jwt-secret
      LOG_LEVEL: warn
      AWS_ENDPOINT: http://localstack-test:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      localstack-test:
        condition: service_healthy
    volumes:
      - ./apps:/app/apps:ro
      - ./packages:/app/packages:ro
      - test_coverage:/app/coverage
    networks:
      - test-network

  # ---------------------------------------------------------------------------
  # E2E Test Runner
  # ---------------------------------------------------------------------------
  e2e-tests:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile.dev
    command: npx playwright test
    environment:
      BASE_URL: http://portal-test:5173
      API_URL: http://api-test:3000
      CI: "true"
    depends_on:
      api-test:
        condition: service_healthy
      portal-test:
        condition: service_healthy
    volumes:
      - ./tests/e2e:/app/tests/e2e:ro
      - e2e_results:/app/test-results
    networks:
      - test-network

  # ---------------------------------------------------------------------------
  # Application Under Test
  # ---------------------------------------------------------------------------
  api-test:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    environment:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgresql://test:test_secret@postgres-test:5432/idp_test
      REDIS_URL: redis://redis-test:6379/0
      JWT_SECRET: test-jwt-secret
      LOG_LEVEL: error
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - test-network

  portal-test:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile.dev
    environment:
      NODE_ENV: test
      VITE_API_URL: http://api-test:3000
    depends_on:
      api-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - test-network

  # ---------------------------------------------------------------------------
  # Test Infrastructure
  # ---------------------------------------------------------------------------
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test_secret
      POSTGRES_DB: idp_test
    tmpfs:
      - /var/lib/postgresql/data # RAM-backed for speed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d idp_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test-network

  redis-test:
    image: redis:7-alpine
    command: redis-server --appendonly no --maxmemory 64mb
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test-network

  localstack-test:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs,sns,secretsmanager
      DEBUG: 0
    tmpfs:
      - /var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-network

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  test_coverage:
    driver: local
  e2e_results:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  test-network:
    driver: bridge
